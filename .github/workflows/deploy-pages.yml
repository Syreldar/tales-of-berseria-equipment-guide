name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Detect the initial catalogue snapshot
        id: snapshot
        run: |
          set -euo pipefail
          if python - <<'PY'
          import json
          from pathlib import Path

          payload = json.loads(Path("site/content/catalogo.json").read_text(encoding="utf-8"))
          raise SystemExit(0 if payload.get("complete") is True else 1)
          PY
          then
            echo "bootstrap=false" >> "$GITHUB_OUTPUT"
          else
            echo "bootstrap=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Install catalogue dependencies
        if: steps.snapshot.outputs.bootstrap == 'true'
        run: python -m pip install --disable-pip-version-check -r requirements.txt

      - name: Materialize the initial local catalogue snapshot
        if: steps.snapshot.outputs.bootstrap == 'true'
        run: |
          set -euo pipefail
          python tools/build_catalog.py --output site/content/catalogo.json

      - name: Validate published content and repository Node usage
        run: |
          set -euo pipefail
          python tools/verify_site.py --site site
          node --check site/assets/site.js
          node --check site/assets/ai.js
          node tools/check_node_runtime.mjs

      - name: Commit the initial catalogue snapshot
        if: steps.snapshot.outputs.bootstrap == 'true'
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add site/content/catalogo.json
          if git diff --cached --quiet; then
            echo "Catalog snapshot is unchanged."
          else
            git commit -m "build: snapshot local equipment catalog"
            git push
          fi

      - name: Configure Pages
        uses: actions/configure-pages@v6

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v5
