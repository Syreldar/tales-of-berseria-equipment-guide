name: Pubblica il sito su GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Scarica il repository
        uses: actions/checkout@v5

      - name: Configura GitHub Pages
        uses: actions/configure-pages@v5

      - name: Carica il sito statico
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./site

      - name: Pubblica
        id: deployment
        uses: actions/deploy-pages@v5
