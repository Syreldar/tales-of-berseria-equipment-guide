name: Archive GameFAQs guide and deploy

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  archive:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      source_commit: ${{ steps.commit.outputs.source_commit }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install importer dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m playwright install --with-deps chromium

      - name: Archive the printable guide
        run: python tools/import_guide.py --root .

      - name: Commit changed source archive
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add archive site/content site/archive
          if git diff --cached --quiet; then
            echo "source_commit=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git commit -m "archive: refresh GameFAQs guide"
          git push
          echo "source_commit=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

  deploy:
    needs: archive
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
      contents: read
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Check out archived revision
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.archive.outputs.source_commit }}

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload static site
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy static site
        id: deployment
        uses: actions/deploy-pages@v4
