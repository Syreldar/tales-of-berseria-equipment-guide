name: Snapshot catalog

on:
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  snapshot-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install snapshot dependencies
        run: python -m pip install --disable-pip-version-check -r requirements.txt

      - name: Build reviewed local catalog snapshot
        run: |
          set -euo pipefail
          python tools/build_catalog.py --output site/content/catalogo.json

      - name: Validate snapshot and site
        run: |
          set -euo pipefail
          python tools/verify_site.py --site site
          node --check site/assets/site.js

      - name: Commit catalog snapshot
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add site/content/catalogo.json
          if git diff --cached --quiet; then
            echo "Catalog snapshot is unchanged."
          else
            git commit -m "build: snapshot local equipment catalog"
            git push
          fi

      - name: Configure Pages
        uses: actions/configure-pages@v6

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: site

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v5
